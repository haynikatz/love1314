<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>张晓青</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;height:100vh}
canvas{display:block;width:100%;height:100%}
.name{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:60px;font-weight:bold;color:#ff3e7e;
text-shadow:0 0 15px #ff69b4,0 0 30px #ff1493;
opacity:0.9;pointer-events:none;
font-family:"Microsoft YaHei",sans-serif
}
</style>
</head>
<body>
<div class="name">张晓青</div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;

class P{constructor(){this.rst()}
rst(){const t=Math.random()*Math.PI*2,r=Math.random()
this.x=(16*Math.sin(t)**3)*12*r+c.width/2
this.y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*12*r+c.height/2
this.vx=(Math.random()-.5)*1.5
this.vy=(Math.random()-.5)*1.5
this.a=1;this.s=Math.random()*2+1
this.l=Math.random()*80+40;this.m=this.l}
upd(){this.l--;this.a=this.l/this.m
this.x+=this.vx;this.y+=this.vy
if(this.l<=0)this.rst()}
drw(){ctx.globalAlpha=this.a
ctx.fillStyle=`hsl(340,100%,65%)`
ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill()}}

const ps=Array.from({length:1000},()=>new P())
let t=0;function ani(){
ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(0,0,c.width,c.height)
t+=.03;for(let i=0;i<Math.PI*2;i+=.02){
const x=(16*Math.sin(i)**3)*15+c.width/2
const y=-(13*Math.cos(i)-5*Math.cos(2*i)-2*Math.cos(3*i)-Math.cos(4*i))*15+c.height/2
const w=Math.sin(t+i*4)*6
ctx.fillStyle='#ff5a8c'
ctx.beginPath();ctx.arc(x+w,y-w,1,0,Math.PI*2);ctx.fill()}
ps.forEach(p=>{p.upd();p.drw()})
requestAnimationFrame(ani)}
ani()
</script>
</body>
</html>
